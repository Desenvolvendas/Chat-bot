<!DOCTYPE html>
<html>
<head>
  <title>Crop Logo</title>
</head>
<body>
  <h3>Cropping Logo...</h3>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="output" style="word-break: break-all; font-family: monospace;"></div>
  
  <script>
    const img = new Image();
    img.src = '/logo-official.png';
    img.onload = () => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      
      const imgData = ctx.getImageData(0, 0, img.width, img.height);
      const data = imgData.data;
      
      let minX = img.width;
      let maxX = 0;
      let minY = img.height;
      let maxY = 0;
      
      // Find bounding box of non-transparent pixels
      for (let y = 0; y < img.height; y++) {
        for (let x = 0; x < img.width; x++) {
          const alpha = data[(y * img.width + x) * 4 + 3];
          if (alpha > 0) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      
      const width = maxX - minX + 1;
      const height = maxY - minY + 1;
      
      // Create a square canvas to center the cropped logo
      const size = Math.max(width, height);
      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = size;
      cropCanvas.height = size;
      const cropCtx = cropCanvas.getContext('2d');
      
      // Center the cropped image in the square canvas
      const dx = (size - width) / 2;
      const dy = (size - height) / 2;
      cropCtx.drawImage(canvas, minX, minY, width, height, dx, dy, width, height);
      
      const base64 = cropCanvas.toDataURL('image/png');
      document.getElementById('output').textContent = base64;
    };
  </script>
</body>
</html>
